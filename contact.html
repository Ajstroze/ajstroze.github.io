<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="stylesheets/base.css">
    <link rel="stylesheet" href="stylesheets/nav.css">
    <link rel="stylesheet" href="stylesheets/pages.css">
    <link rel="stylesheet" href="stylesheets/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-background">
        <!-- Hamburger Menu Button -->
        <button id="hamburger" aria-label="Toggle menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <!-- Navigation Menu -->
        <nav id="menu" class="menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="reading.html">Articles I'm reading</a></li>
            </ul>
        </nav>

        <!-- Contact Content -->
        <main class="contact">
            <div class="contact-content">
                <h1>Get In Touch</h1>
                <p class="lead">Have a question or proposal? I'd love to hear from you.</p>

                <div class="contact-container">
                    <!-- Contact Form -->
                    <form class="contact-form" action="#" method="POST">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" placeholder="Your name" required>
                        </div>

                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="your@email.com" required>
                        </div>

                        <div class="form-group">
                            <label for="subject">Subject</label>
                            <input type="text" id="subject" name="subject" placeholder="What is this about?">
                        </div>

                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="6" placeholder="Your message here…" required></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary">Send Message</button>
                    </form>

                    <!-- Contact Info -->
                    <div class="contact-info">
                        <div class="info-block">
                            <h3>Email</h3>
                            <a href="mailto:ajstroze@email.com">ajstroze@email.com</a>
                        </div>

                        <div class="info-block">
                            <h3>Location</h3>
                            <p>Raleigh, NC</p>
                        </div>

                        <div class="info-block">
                            <h3>Social</h3>
                            <div class="social-links">
                                <a href="https://linkedin.com/in/andrew-strozewski" target="_blank" rel="noopener" aria-label="LinkedIn">LinkedIn</a>
                                <a href="https://github.com/ajstroze" target="_blank" rel="noopener" aria-label="GitHub">GitHub</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Menu Toggle Script -->
    <script>
        const hamburger = document.getElementById('hamburger');
        const menu = document.getElementById('menu');

        hamburger.addEventListener('click', function() {
            this.classList.toggle('active');
            menu.classList.toggle('open');
            
            const isExpanded = this.classList.contains('active');
            this.setAttribute('aria-expanded', isExpanded);
        });
    </script>
</body>
</html>
